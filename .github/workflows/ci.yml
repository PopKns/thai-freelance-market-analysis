name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        # only what the offline test suite imports (no streamlit/pythainlp needed)
        run: pip install pandas pyarrow httpx scikit-learn pytest ruff
      - name: Lint
        run: ruff check src/ dashboard/ tests/
      - name: Test
        run: python -m pytest tests/ -q
